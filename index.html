<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GlobalGate</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#10b981;
padding:15px;
text-align:center;
font-size:22px;
}

nav{
background:#1e293b;
padding:10px;
text-align:center;
}

button{
padding:10px;
margin:5px;
background:#10b981;
border:none;
color:white;
}

.card{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:8px;
}

</style>

</head>

<body>

<header>🌍 GlobalGate</header>

<nav>

<button onclick="marketplace()">Marketplace</button>
<button onclick="sell()">Sell</button>
<button onclick="account()">Account</button>

</nav>

<div id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


window.account = function(){

document.getElementById("app").innerHTML=

`
<h2>Account</h2>

<input id="email" placeholder="Email">

<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>
`

}


window.signup = async function(){

let email=document.getElementById("email").value

let pass=document.getElementById("pass").value

await createUserWithEmailAndPassword(auth,email,pass)

alert("Account created")

}


window.login = async function(){

let email=document.getElementById("email").value

let pass=document.getElementById("pass").value

await signInWithEmailAndPassword(auth,email,pass)

alert("Logged in")

}


window.sell = function(){

document.getElementById("app").innerHTML=

`
<h2>Sell Product</h2>

<input id="pname" placeholder="Product">

<input id="pprice" placeholder="Price">

<input id="psupplier" placeholder="Company">

<button onclick="addProduct()">Add Product</button>
`

}


window.addProduct = async function(){

let name=document.getElementById("pname").value

let price=document.getElementById("pprice").value

let supplier=document.getElementById("psupplier").value

await addDoc(collection(db,"products"),{

name:name,
price:price,
supplier:supplier

})

alert("Product listed")

}


window.marketplace = async function(){

const querySnapshot = await getDocs(collection(db,"products"))

let html="<h2>Marketplace</h2>"

querySnapshot.forEach(doc=>{

let p=doc.data()

html+=`

<div class="card">

<b>${p.name}</b><br>

Supplier: ${p.supplier}<br>

Price: $${p.price}

</div>

`

})

document.getElementById("app").innerHTML=html

}

marketplace()

</script>

</body>
</html>
