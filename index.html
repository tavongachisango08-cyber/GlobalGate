<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GlobalGate</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#1a73e8,#00c6ff);
color:white;
}

header{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px;
border:none;
background:#00ffcc;
border-radius:6px;
margin:5px;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

#feed{
padding:20px;
}

.card{
background:white;
color:black;
padding:15px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h2>🌍 GlobalGate</h2>

<div>

<button onclick="showSection('market')">Market</button>
<button onclick="showSection('freight')">Freight</button>
<button onclick="showSection('orders')">Orders</button>
<button onclick="showSection('profile')">Profile</button>

</div>

</header>

<div id="feed">

<div id="market">

<h3>Find Products</h3>

<input id="productSearch" placeholder="Search product">

<button onclick="searchProduct()">Search</button>

<div id="productList"></div>

</div>

<div id="freight" style="display:none">

<h3>Freight Calculator</h3>

<input id="weight" placeholder="Weight KG">

<select id="type">
<option>Air</option>
<option>Sea</option>
</select>

<button onclick="freight()">Estimate</button>

<p id="freightResult"></p>

</div>

<div id="orders" style="display:none">

<h3>Your Orders</h3>

<div id="ordersList"></div>

</div>

<div id="profile" style="display:none">

<h3>Account</h3>

<input id="email" placeholder="email">

<input id="password" type="password" placeholder="password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

import {

getFirestore,
collection,
addDoc,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


const firebaseConfig = {

apiKey:"YOURKEY",
authDomain:"YOURDOMAIN",
projectId:"YOURPROJECT"

}

const app=initializeApp(firebaseConfig)

const auth=getAuth()

const db=getFirestore()

window.signup=async function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

await createUserWithEmailAndPassword(auth,email,password)

alert("Account created")

}

window.login=async function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,password)

alert("Logged in")

}

window.searchProduct=async function(){

let q=document.getElementById("productSearch").value

let snapshot=await getDocs(collection(db,"products"))

let list=document.getElementById("productList")

list.innerHTML=""

snapshot.forEach(doc=>{

let d=doc.data()

if(d.name.includes(q)){

list.innerHTML+=`

<div class="card">

<h4>${d.name}</h4>

<p>Price: $${d.price}</p>

<button onclick="order('${doc.id}',${d.price})">Order</button>

</div>

`

}

})

}

window.order=async function(id,price){

let fee=price*0.02

await addDoc(collection(db,"orders"),{

product:id,
price:price,
fee:fee,
status:"pending"

})

alert("Order placed")

}

window.freight=function(){

let weight=document.getElementById("weight").value
let type=document.getElementById("type").value

let cost

if(type=="Air") cost=weight*6
if(type=="Sea") cost=weight*1.5

document.getElementById("freightResult").innerText="$"+cost

}

window.showSection=function(id){

document.querySelectorAll("#feed>div").forEach(d=>d.style.display="none")

document.getElementById(id).style.display="block"

}

</script>

</body>

</html>
