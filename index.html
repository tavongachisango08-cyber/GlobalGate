<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GlobalGate</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#10b981;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

button{
padding:12px;
margin:5px;
border:none;
background:#10b981;
color:white;
border-radius:6px;
}

.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

input{
padding:10px;
margin:5px;
width:100%;
}

</style>

</head>

<body>

<header>
GlobalGate
</header>

<div class="container">

<h2>Account</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<h2>Marketplace</h2>

<div id="products"></div>

<hr>

<h2>Add Product (Suppliers)</h2>

<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">

<button onclick="addProduct()">Add Product</button>

<hr>

<h2>Shipment Tracker</h2>

<input id="track" placeholder="Tracking Number">

<button onclick="trackShipment()">Track</button>

<div id="trackingResult"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore,collection,addDoc,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "XXXX",

appId: "XXXX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.register = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>alert("Account created"))
.catch(e=>alert(e.message));

}

window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>alert("Logged in"))
.catch(e=>alert(e.message));

}

window.addProduct = async function(){

const name = document.getElementById("pname").value;
const price = document.getElementById("pprice").value;

await addDoc(collection(db,"products"),{

name:name,
price:price

});

loadProducts();

}

async function loadProducts(){

const querySnapshot = await getDocs(collection(db,"products"));

let html="";

querySnapshot.forEach((doc)=>{

const data = doc.data();

html+=`
<div class="card">
<b>${data.name}</b>
<br>
$${data.price}
<br>
<button>Order</button>
</div>
`;

});

document.getElementById("products").innerHTML = html;

}

loadProducts();

window.trackShipment = function(){

const number = document.getElementById("track").value;

document.getElementById("trackingResult").innerHTML =

"Shipment "+number+" is in transit 🚚";

}

</script>

</body>
</html>
