<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GlobalGate</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
background:#10b981;
padding:20px;
font-size:24px;
font-weight:bold;
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:8px;
background:#10b981;
color:white;
font-size:16px;
}

input{
padding:10px;
margin:10px;
border-radius:6px;
border:none;
width:80%;
}

.card{
background:#1e293b;
margin:15px;
padding:15px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
🌍 GlobalGate
</header>

<h3>African Global Trade Platform</h3>

<button onclick="showSuppliers()">Find Suppliers</button>
<button onclick="showCountries()">African Countries</button>
<button onclick="trackShipment()">Track Shipment</button>

<div id="content"></div>

<script>

const suppliers=[

{name:"Alibaba",country:"China"},
{name:"IndiaMart",country:"India"},
{name:"TradeKey",country:"USA"},
{name:"GlobalSources",country:"Hong Kong"},
{name:"MadeInChina",country:"China"},
{name:"EC21",country:"South Korea"},
{name:"Jumia",country:"Africa"},
{name:"Takealot",country:"South Africa"},
{name:"Konga",country:"Nigeria"},
{name:"Kilomall",country:"Kenya"},
{name:"DHgate",country:"China"},
{name:"ThomasNet",country:"USA"},
{name:"ExportHub",country:"Canada"}

]

const africanCountries=[

"Algeria","Angola","Benin","Botswana","Burkina Faso","Burundi",
"Cabo Verde","Cameroon","Central African Republic","Chad",
"Comoros","DR Congo","Republic of Congo","Djibouti","Egypt",
"Equatorial Guinea","Eritrea","Eswatini","Ethiopia","Gabon",
"Gambia","Ghana","Guinea","Guinea-Bissau","Ivory Coast","Kenya",
"Lesotho","Liberia","Libya","Madagascar","Malawi","Mali",
"Mauritania","Mauritius","Morocco","Mozambique","Namibia",
"Niger","Nigeria","Rwanda","Sao Tome","Senegal","Seychelles",
"Sierra Leone","Somalia","South Africa","South Sudan","Sudan",
"Tanzania","Togo","Tunisia","Uganda","Zambia","Zimbabwe"

]

function showSuppliers(){

let html="<h2>Global Suppliers</h2>"

suppliers.forEach(s=>{

html+=`

<div class="card">
<h3>${s.name}</h3>
<p>${s.country}</p>
<button onclick="contactSupplier('${s.name}')">Contact</button>
</div>

`

})

document.getElementById("content").innerHTML=html

}

function contactSupplier(name){

alert("Contacting supplier: "+name)

}

function showCountries(){

let html="<h2>African Markets</h2>"

africanCountries.forEach(c=>{

html+=`

<div class="card">
${c}
</div>

`

})

document.getElementById("content").innerHTML=html

}

function trackShipment(){

document.getElementById("content").innerHTML=`

<h2>Shipment Tracker</h2>

<input id="trackID" placeholder="Enter tracking ID">

<button onclick="searchShipment()">Track</button>

<div id="result"></div>

`

}

function searchShipment(){

let id=document.getElementById("trackID").value

document.getElementById("result").innerHTML=

`<div class="card">

Shipment <b>${id}</b> is currently in transit 🌍

<br><br>

Status: At International Port

</div>`

}

</script>

</body>
</html>
